on:
  push:
    branches:
      - feat/**
      - fix/**
      - improv/**
      - chore/**
      - refactor/**
      - bugfix/**

jobs:
  fmt-vet-api:
    name: Format & Vet (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/holidays-api-service
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: |
          go fmt ./...
          go vet ./...

  test-api:
    name: Tests (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/holidays-api-service
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -v ./...

  lint-api:
    name: Lint (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v8
        with:
          working-directory: services/holidays-api-service
          version: v2.5.0

  gosec-api:
    name: Gosec (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: securego/gosec@master
        with:
          args: ./services/holidays-api-service/...

  go-verifier-api:
    name: Go Verifier (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/holidays-api-service
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: |
          go install github.com/KostLabs/go-verifier/cmd/goverifier@latest
          goverifier ./...

